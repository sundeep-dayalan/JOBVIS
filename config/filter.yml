title_filter:
  include_any:
    - "Software Engineer"
  exclude_any:
    - "Junior"

job_description_filter:
  include_any:
    - "Java"
    - "Spring"
    - "Spring Boot"
  exclude_any:
    - "Secret clearance"
    - "US citizenship required"

  # Regex patterns matched against raw description text (case-insensitive).
  # Any match immediately ignores the job in the preliminary filter.
  description_pattern_excludes:
    # Ignore contract jobs if Hourly pay ranges found:  $40 – $150/hour  |  $25/hr  |  45/hour  |  USD 30/hr
    - '\$?\d+(?:\.\d+)?\s*(?:–|-|to)\s*\$?\d+(?:\.\d+)?\s*/\s*h(?:ou)?r'

location_filter:
  # Allowlist: ONLY Washington state (WA) jobs and remote jobs are allowed.
  # A missing / blank location is passed through (filtered later by the LLM).
  include_any:
    # ── Remote variants ──────────────────────────────────────────────────────
    - "remote"
    - "remote us"
    - "remote - us"
    - "remote (us"
    - "us remote"
    - "remote, united states"
    - "remote, usa"
    - "anywhere in the us"
    - "anywhere in us"
    - "work from home"
    - "distributed"
    - "anywhere"
    - "United States"

    # ── Washington State — city names ────────────────────────────────────────
    - "seattle"
    - "bellevue"
    - "redmond"
    - "kirkland"
    - "tacoma"
    - "olympia"
    - "bothell"
    - "sammamish"
    - "issaquah"
    - "renton"
    - "kent"
    - "federal way"
    - "auburn"
    - "everett"
    - "shoreline"
    - "burien"
    - "lakewood"
    - "marysville"
    - "lacey"
    - "pasco"
    - "richland"
    - "kennewick"
    - "spokane"
    - "vancouver" # Vancouver, WA (not BC)
    - "bellingham"
    - "yakima"
    - "walla walla"

    # ── Washington State — abbreviation / suffix patterns ────────────────────
    - ", wa" # "Seattle, WA" / "Bellevue, WA 98004"
    - ", wa "
    - " wa "
    - "(wa)"
    - "washington state"
    - ", washington" # e.g. "Seattle, Washington"

linkedin-filter:
  ignore_easy_apply: true

experience_filter:
  min_years: 3
  max_years: 6
  require_explicit_match: false
