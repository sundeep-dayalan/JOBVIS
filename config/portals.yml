tracked_companies:

  # ── LinkedIn ────────────────────────────────────────────────────────────────
  # These are scraped via the browser extension (requires user session)
  # The extension sends job data to /api/deepscan — no config needed here.

  # ── Ashby ───────────────────────────────────────────────────────────────────
  # Ashby boards have a fully public GraphQL API — no auth required.
  # The backend can pull these directly via /api/scrape/ashby
  # The slug in: jobs.ashbyhq.com/<org_slug>
  - name: Pinecone
    source: ashby
    org_slug: pinecone
    enabled: true
  - name: Lambda
    source: ashby
    org_slug: lambda
    enabled: true
