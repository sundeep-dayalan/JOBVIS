<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOBVIS</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <div class="header" id="appHeader">
    <div class="logo">JOBVIS</div>
    <div class="subtitle" id="headerSubtitle">Multi-Source Job Scraper</div>
    <div id="envBadge" style="display:none"></div>
  </div>

  <!-- Dev stripe -->
  <div class="env-stripe" id="envStripe">
    ⚠️ Connected to <strong>DEV</strong> database — not production
  </div>

  <!-- Source indicator -->
  <div class="source-bar" id="sourceBar">
    <span class="source-dot" id="sourceDot"></span>
    <span id="sourceLabel">Navigate to a supported job board</span>
  </div>

  <!-- Config (LinkedIn only — hidden for instant sources like Ashby) -->
  <div class="section" id="configSection">
    <div class="row">
      <label for="maxPages">Max Pages</label>
      <input type="number" id="maxPages" value="1000" min="1" max="9999">
    </div>
    <div class="row">
      <label for="delay">Delay between jobs (ms)</label>
      <input type="number" id="delay" value="1000" min="500" max="10000" step="250">
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button id="startBtn" class="btn primary">Start Scraping</button>
    <button id="stopBtn" class="btn danger" disabled>Stop</button>
  </div>

  <!-- Status & Progress -->
  <div class="status-section">
    <div class="status-row">
      <span class="status-badge idle" id="statusBadge">Idle</span>
      <span class="started-at" id="startedAt"></span>
    </div>

    <div id="phasePill" class="phase-pill" style="display:none">PHASE 1</div>

    <div class="stats">
      <div class="stat">
        <span class="stat-label" id="stat1Label">Page</span>
        <span class="stat-value" id="stat1Value">—</span>
      </div>
      <div class="stat">
        <span class="stat-label" id="stat2Label">IDs found</span>
        <span class="stat-value" id="stat2Value">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Fetched</span>
        <span class="stat-value highlight" id="totalScraped">0</span>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Output -->
  <div class="output-section">
    <button id="downloadBtn" class="btn secondary full-width" disabled>
      Download JSON
    </button>
    <button id="copyBtn" class="btn secondary full-width" disabled>
      Copy to Clipboard
    </button>
    <button id="clearBtn" class="btn ghost full-width">
      Clear Data
    </button>
  </div>

  <div id="message" class="message"></div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
